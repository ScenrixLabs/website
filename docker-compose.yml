networks:
  scenrix_net:
    driver: bridge

services:
  caddy:
    image: caddy:2.7-alpine
    container_name: scenrix-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - scenrix_net
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
    container_name: scenrix-frontend
    restart: unless-stopped
    networks:
      - scenrix_net

volumes:
  caddy_data:
  caddy_config:
